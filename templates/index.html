<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>EHR-Assist Clinical Query System</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet"
/>

<style>

body{
background:#f4f6f8;
font-family:system-ui;
}

.header{
background:#2f6fdd;
color:white;
padding:12px;
text-align:center;
font-size:20px;
font-weight:600;
}

.main{
max-width:950px;
margin:auto;
padding:20px;
}

.card-box{
background:white;
border-radius:8px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
border:1px solid #dcdcdc;
display:none;
}

.user-box{ border-left:5px solid #2f6fdd; }
.intent-box{ border-left:5px solid #6f42c1; }
.semantic-box{ border-left:5px solid #ff9800; }
.response-box{ border-left:5px solid #198754; }

.result-table {
border:1px solid #444;
border-collapse:collapse;
}

.result-table th,
.result-table td{
font-size:14px;
padding:6px;
border:1px solid #444;
text-align:center;
}

.result-table th{
background:#f1f1f1;
font-weight:600;
}

.footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #ddd;
padding:10px;
}

.footer-box{
max-width:950px;
margin:auto;
display:flex;
gap:10px;
}

.step{
background:#f8f9fa;
border-left:4px solid #2f6fdd;
padding:8px;
margin-bottom:6px;
border-radius:4px;
font-size:14px;
}

pre{
margin:0;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="header">
EHR-Assist Clinical Query System (Explainable)
</div>

<div class="main">

<!-- Query -->
<div id="queryBox" class="card-box user-box">
<h5>👤 User Query</h5>
<div id="userQueryText"></div>
</div>

<!-- Steps -->
<div id="stepsBox" class="card-box intent-box">
<h5>🧾 Interpretation Steps</h5>
<div id="steps"></div>
</div>

<!-- Semantic -->
<div id="semanticBox" class="card-box semantic-box">
<h5>🧠 Semantic Mapping</h5>
<pre id="semantic"></pre>
</div>

<!-- AQL -->
<div id="aqlBox" class="card-box response-box">
<h5>🧬 Generated AQL</h5>
<pre id="aql"></pre>
</div>

<!-- Results -->
<div id="resultBox" class="card-box response-box">

<h5>📊 Results</h5>

<div id="count" style="margin-bottom:10px;font-weight:600;"></div>

<table class="table table-sm result-table">
<thead>
<tr id="table-head"></tr>
</thead>
<tbody id="table-body"></tbody>
</table>

</div>

</div>

<!-- Footer -->
<div class="footer">
<div class="footer-box">

<input
id="query"
class="form-control"
placeholder="Ask a clinical query..."
>

<button
class="btn btn-primary"
onclick="sendQuery()">
Send
</button>

<button
class="btn btn-danger"
onclick="resetUI()">
Reset
</button>

</div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

function resetUI(){

$("#query").val("");

$("#queryBox, #stepsBox, #semanticBox, #aqlBox, #resultBox").hide();

$("#userQueryText").text("");
$("#steps").html("");
$("#semantic").text("");
$("#aql").text("");
$("#table-head").html("");
$("#table-body").html("");
$("#count").text("");
}

function sendQuery(){

let q=$("#query").val();

if(!q) return;

$("#query").prop("disabled", true);

$.ajax({

url:"/api/nlp_query",
type:"POST",
contentType:"application/json",
data:JSON.stringify({query:q}),

success:function(res){

$("#query").prop("disabled", false);

// show sections
$("#queryBox, #stepsBox, #semanticBox, #aqlBox").show();

// query
$("#userQueryText").text(q);

// steps
let stepsHTML="";
res.explanation.steps.forEach(s=>{
stepsHTML += `<div class="step">➡️ ${s}</div>`;
});
$("#steps").html(stepsHTML);

// semantic
$("#semantic").text(res.explanation.semantic);

// aql
$("#aql").text(res.aql);

// results
if(res.results.length === 0){
$("#resultBox").hide();
return;
}

$("#resultBox").show();

// count case
if(res.results.length === 1 && res.results[0].count !== undefined){
$("#count").text("Result: " + res.results[0].count);
$("#table-head").html("");
$("#table-body").html("");
return;
}

$("#count").text(res.results.length + " record(s)");

let head="<th>S.No</th>";
let body="";

Object.keys(res.results[0]).forEach(f=>{
head += `<th>${f}</th>`;
});

res.results.forEach((r,i)=>{

body += "<tr>";
body += `<td>${i+1}</td>`;

Object.values(r).forEach(v=>{
body += `<td>${escapeHTML(v ?? "-")}</td>`;
});

body += "</tr>";
});

$("#table-head").html(head);
$("#table-body").html(body);

},

error:function(){
$("#query").prop("disabled", false);
alert("Server error");
}

});

}

function escapeHTML(str){
return String(str)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

</script>

</body>
</html>
